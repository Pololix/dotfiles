background {
    monitor =
    path = ~/wallpaper.jpg   # set your wallpaper path here
    blur_passes = 2
    blur_size = 7
}

input-field {
    monitor =
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.2
    outer_color = rgb(cdd6f4)
    inner_color = rgb(1e1e2e)
    font_color = rgb(cdd6f4)
    fail_color = rgb(f38ba8)
    check_color = rgb(f9e2af)
    placeholder_text = <i>Password...</i>
    position = 0, -100
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +'%H:%M')</b>"
    color = rgba(cdd6f4ff)
    font_size = 64
    font_family = JetBrains Mono Nerd Font
    position = 0, 200
    halign = center
    valign = center
}
