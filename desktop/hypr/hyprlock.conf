general {
    hide_cursor = true
    fail_timeout = 500
}

background {
    color = rgba(0, 0, 0, 0)
}

input-field {
    size = 12%, 4%
    outline_thickness = 1

    dots_size = 0.2
    dots_spacing = .35
    dots_center = true

    outer_color = rgba(0, 0, 0, 0)
    outer_color = rgba(0, 0, 0, 0)
    font_color = rgba(143, 143, 143)

    rounding = 15
    position = 0, -20
    halign = center
    valign = center
}

# Date
label {
    text = cmd[update:1000] echo "$(date +"%-I:%M")"
    color = rgba(242, 243, 244, 0.75)
    font_size = 22
    font_family = JetBrainMono Nerd Font Mono

    position = 0, 300
    halign = center
    valign = center
}
